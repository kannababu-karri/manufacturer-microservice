spring.application.name=restful.manufacturer

server.port=8091

#logging.file.name=logs/application-manufacturer.log
logging.file.name=/var/log/mvc-enterprises/manufacturer-service.log
logging.level.root=INFO
logging.level.com.yourapp.controller=INFO
logging.level.com.yourapp.service=DEBUG
logging.level.org.springframework.web=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

#logging.level.io.github.resilience4j=DEBUG
#logging.level.org.springframework.boot.context.properties=DEBUG

spring.jpa.database=mysql
spring.datasource.url=jdbc:mysql://localhost:3306/enterprise_model
spring.datasource.username=root
spring.datasource.password=44Tr$$Peta
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

resilience4j.circuitbreaker.instances.circuitBreakerService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.circuitBreakerService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.circuitBreakerService.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.circuitBreakerService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.circuitBreakerService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.circuitBreakerService.permittedNumberOfCallsInHalfOpenState=2

resilience4j.retry.instances.retryService.maxAttempts=3
resilience4j.retry.instances.retryService.waitDuration=2s

resilience4j.ratelimiter.instances.rateLimiterService.limitForPeriod=2
resilience4j.ratelimiter.instances.rateLimiterService.limitRefreshPeriod=5s
resilience4j.ratelimiter.instances.rateLimiterService.timeoutDuration=1s

spring.cloud.config.import-check.enabled=false

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
#http://localhost:8091/actuator/health
management.endpoints.web.base-path=/actuator

#In real systems:
#Kubernetes → /actuator/health
#Prometheus → /actuator/prometheus
#Service Mesh → readiness/liveness probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

management.metrics.distribution.percentiles-histogram.login.processing.time=true