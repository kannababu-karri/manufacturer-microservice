name: Manufacturer Microservice CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Run Unit Tests
        run: mvn clean test

      - name: Static Code Analysis (SonarQube)
        uses: sonarsource/sonarcloud-github-action@master
        with:
          projectKey: your-org_manufacturer
          organization: your-org
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t ghcr.io/your-org/manufacturer:${{ github.sha }} .

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/your-org/manufacturer:${{ github.sha }}

      - name: Push Docker Image
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/your-org/manufacturer:${{ github.sha }}

  helm-deploy:
    runs-on: ubuntu-latest
    needs: docker-build-and-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Update Helm Chart image tag
        run: |
          sed -i "s|tag: .*|tag: ${{ github.sha }}|" helm/manufacturer-chart/values.yaml

      - name: Push Helm Chart to Repo
        run: |
          helm repo add my-repo https://my-helm-repo.com/charts
          helm package helm/manufacturer-chart
          helm push manufacturer-chart-*.tgz my-repo

      - name: Trigger Argo CD Sync
        run: |
          argocd app sync manufacturer --server ${{ secrets.ARGO_SERVER }} --auth-token ${{ secrets.ARGO_TOKEN }}
